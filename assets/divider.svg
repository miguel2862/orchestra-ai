<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 30" fill="none">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="30%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <line x1="100" y1="15" x2="800" y2="15" stroke="url(#divGrad)" stroke-width="1">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </line>
  <circle cx="450" cy="15" r="3" fill="#a78bfa" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3.5;2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
