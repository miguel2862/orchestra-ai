<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" fill="none">
  <defs>
    <linearGradient id="pBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0815"/>
      <stop offset="100%" stop-color="#16102b"/>
    </linearGradient>
    <linearGradient id="flowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.1"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="120" fill="url(#pBg)" rx="12"/>

  <!-- Flow line -->
  <line x1="80" y1="60" x2="820" y2="60" stroke="url(#flowLine)" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" values="20;0" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- Agent nodes -->
  <!-- PM -->
  <g filter="url(#nodeGlow)">
    <circle cx="100" cy="60" r="18" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <text x="100" y="55" text-anchor="middle" font-size="16">&#x1F9E0;</text>
    <text x="100" y="68" text-anchor="middle" font-size="7" fill="#a78bfa" font-family="system-ui, sans-serif">PM</text>
  </g>

  <!-- Architect -->
  <g filter="url(#nodeGlow)">
    <circle cx="200" cy="60" r="18" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <text x="200" y="55" text-anchor="middle" font-size="16">&#x1F3DB;</text>
    <text x="200" y="68" text-anchor="middle" font-size="7" fill="#a78bfa" font-family="system-ui, sans-serif">Arch</text>
  </g>

  <!-- Developer (hub - bigger) -->
  <g filter="url(#nodeGlow)">
    <circle cx="340" cy="60" r="24" fill="#2e1065" stroke="#a855f7" stroke-width="2.5" opacity="1">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="23;25;23" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="340" y="55" text-anchor="middle" font-size="18">&#x1F4BB;</text>
    <text x="340" y="68" text-anchor="middle" font-size="7" fill="#c084fc" font-weight="700" font-family="system-ui, sans-serif">Dev</text>
  </g>

  <!-- Error Checker -->
  <g filter="url(#nodeGlow)">
    <circle cx="470" cy="35" r="16" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <text x="470" y="31" text-anchor="middle" font-size="14">&#x1F50D;</text>
    <text x="470" y="43" text-anchor="middle" font-size="6" fill="#a78bfa" font-family="system-ui, sans-serif">Err</text>
  </g>

  <!-- Security -->
  <g filter="url(#nodeGlow)">
    <circle cx="470" cy="85" r="16" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <text x="470" y="81" text-anchor="middle" font-size="14">&#x1F512;</text>
    <text x="470" y="93" text-anchor="middle" font-size="6" fill="#a78bfa" font-family="system-ui, sans-serif">Sec</text>
  </g>

  <!-- Tester -->
  <g filter="url(#nodeGlow)">
    <circle cx="550" cy="35" r="16" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="550" y="31" text-anchor="middle" font-size="14">&#x1F9EA;</text>
    <text x="550" y="43" text-anchor="middle" font-size="6" fill="#a78bfa" font-family="system-ui, sans-serif">Test</text>
  </g>

  <!-- Reviewer -->
  <g filter="url(#nodeGlow)">
    <circle cx="550" cy="85" r="16" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
    <text x="550" y="81" text-anchor="middle" font-size="14">&#x1F441;</text>
    <text x="550" y="93" text-anchor="middle" font-size="6" fill="#a78bfa" font-family="system-ui, sans-serif">Rev</text>
  </g>

  <!-- Deployer -->
  <g filter="url(#nodeGlow)">
    <circle cx="680" cy="60" r="18" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="680" y="55" text-anchor="middle" font-size="16">&#x1F680;</text>
    <text x="680" y="68" text-anchor="middle" font-size="7" fill="#a78bfa" font-family="system-ui, sans-serif">Deploy</text>
  </g>

  <!-- Visual Tester -->
  <g filter="url(#nodeGlow)">
    <circle cx="800" cy="60" r="18" fill="#1e1b4b" stroke="#10b981" stroke-width="1.5" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" begin="1.9s" repeatCount="indefinite"/>
    </circle>
    <text x="800" y="55" text-anchor="middle" font-size="16">&#x1F5A5;</text>
    <text x="800" y="68" text-anchor="middle" font-size="7" fill="#6ee7b7" font-family="system-ui, sans-serif">Visual</text>
  </g>

  <!-- Feedback arrows (dashed, animated) -->
  <path d="M460,30 Q400,10 350,42" stroke="#f59e0b" stroke-width="1" fill="none" stroke-dasharray="4 3" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="14;0" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M540,30 Q440,5 350,42" stroke="#f59e0b" stroke-width="1" fill="none" stroke-dasharray="4 3" opacity="0.4">
    <animate attributeName="stroke-dashoffset" values="14;0" dur="1s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </path>

  <!-- Labels -->
  <text x="450" y="115" text-anchor="middle" font-size="9" fill="#737373" font-family="system-ui, sans-serif" letter-spacing="2">PLAN  &#x2192;  DESIGN  &#x2192;  BUILD  &#x2192;  QUALITY GATES  &#x2192;  SHIP  &#x2192;  VERIFY</text>
</svg>
