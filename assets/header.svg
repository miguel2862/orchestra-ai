<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0815"/>
      <stop offset="40%" stop-color="#16102b"/>
      <stop offset="100%" stop-color="#0d1a25"/>
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="20%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="noteGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)" rx="16"/>

  <!-- Ambient glow behind logo -->
  <ellipse cx="450" cy="105" rx="180" ry="70" fill="#7c3aed" opacity="0.06">
    <animate attributeName="opacity" values="0.04;0.09;0.04" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="170;190;170" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Horizontal separator line -->
  <rect x="100" y="180" width="700" height="1" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ Music note icon (conductor baton animation matching Layout.tsx) ═══ -->
  <g transform="translate(383, 62)" filter="url(#noteGlow)">
    <!-- Conductor arc: rotate -12→8→-4→0, scale 1→1.12→0.95→1 -->
    <animateTransform attributeName="transform" type="rotate"
      values="-12,17,20; 8,17,20; -4,17,20; 0,17,20; -12,17,20"
      dur="3.2s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="scale"
      values="1; 1.12; 0.95; 1"
      dur="3.2s" repeatCount="indefinite" additive="sum"/>
    <!-- SVG music note matching Layout.tsx exactly -->
    <path d="M9 18V5l12-2v13" stroke="url(#violetGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="6" cy="18" r="3" stroke="url(#violetGrad)" stroke-width="2.5" fill="none"/>
    <circle cx="18" cy="16" r="3" stroke="url(#violetGrad)" stroke-width="2.5" fill="none"/>
  </g>

  <!-- ═══ Floating note particles (♪ ♫ ♬ ♩) matching Layout.tsx burst pattern ═══ -->

  <!-- Burst 1: ♪ drifts up-left -->
  <text font-size="15" fill="#a78bfa" opacity="0" font-family="serif" filter="url(#glow)">♪
    <animate attributeName="opacity" values="0;0.9;0.7;0" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="80;56" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="x" values="378;366" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
  </text>

  <!-- Burst 1: ♫ drifts up-right (600ms after ♪, matching Layout.tsx burst timing) -->
  <text font-size="13" fill="#c084fc" opacity="0" font-family="serif" filter="url(#glow)">♫
    <animate attributeName="opacity" values="0;0.8;0.6;0" dur="1.8s" begin="1.4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="72;50" dur="1.8s" begin="1.4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="410;424" dur="1.8s" begin="1.4s" repeatCount="indefinite"/>
  </text>

  <!-- Burst 2: ♬ drifts up-left (2.8s cycle matching Layout.tsx) -->
  <text font-size="14" fill="#818cf8" opacity="0" font-family="serif" filter="url(#glow)">♬
    <animate attributeName="opacity" values="0;0.85;0.6;0" dur="1.8s" begin="3.6s" repeatCount="indefinite"/>
    <animate attributeName="y" values="76;52" dur="1.8s" begin="3.6s" repeatCount="indefinite"/>
    <animate attributeName="x" values="375;360" dur="1.8s" begin="3.6s" repeatCount="indefinite"/>
  </text>

  <!-- Burst 2: ♩ drifts up-right -->
  <text font-size="12" fill="#a78bfa" opacity="0" font-family="serif" filter="url(#glow)">♩
    <animate attributeName="opacity" values="0;0.8;0.5;0" dur="1.8s" begin="4.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="70;48" dur="1.8s" begin="4.2s" repeatCount="indefinite"/>
    <animate attributeName="x" values="415;430" dur="1.8s" begin="4.2s" repeatCount="indefinite"/>
  </text>

  <!-- Burst 3: ♪ center-left -->
  <text font-size="11" fill="#c084fc" opacity="0" font-family="serif" filter="url(#glow)">♪
    <animate attributeName="opacity" values="0;0.7;0.4;0" dur="1.8s" begin="6.4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="78;58" dur="1.8s" begin="6.4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="385;372" dur="1.8s" begin="6.4s" repeatCount="indefinite"/>
  </text>

  <!-- Burst 3: ♫ center-right -->
  <text font-size="13" fill="#818cf8" opacity="0" font-family="serif" filter="url(#glow)">♫
    <animate attributeName="opacity" values="0;0.85;0.6;0" dur="1.8s" begin="7.0s" repeatCount="indefinite"/>
    <animate attributeName="y" values="68;46" dur="1.8s" begin="7.0s" repeatCount="indefinite"/>
    <animate attributeName="x" values="408;420" dur="1.8s" begin="7.0s" repeatCount="indefinite"/>
  </text>

  <!-- ═══ Title: "Orchestra AI" with breathing animation ═══ -->
  <text x="450" y="125" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="42" fill="url(#violetGrad)" filter="url(#glow)">
    Orchestra AI
    <!-- Breathing scale+opacity matching Layout.tsx glowRef -->
    <animate attributeName="opacity" values="1;0.85;1" dur="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="scale"
      values="1;1.03;1" dur="3s" repeatCount="indefinite"
      additive="sum"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="158" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="16" fill="#a3a3a3" letter-spacing="0.5">
    From idea to verified app — powered by 10 AI agents
  </text>

  <!-- Bottom badges -->
  <g transform="translate(255, 200)">
    <rect width="78" height="26" rx="13" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
    <text x="39" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c084fc" font-weight="500">npm v0.4.0</text>
  </g>
  <g transform="translate(345, 200)">
    <rect width="80" height="26" rx="13" fill="#10b981" opacity="0.12" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
    <text x="40" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6ee7b7" font-weight="500">Node &gt;=18</text>
  </g>
  <g transform="translate(437, 200)">
    <rect width="52" height="26" rx="13" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1"/>
    <text x="26" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#93c5fd" font-weight="500">MIT</text>
  </g>
  <g transform="translate(501, 200)">
    <rect width="145" height="26" rx="13" fill="#6366f1" opacity="0.12" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
    <text x="72" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc" font-weight="500">macOS / Win / Linux</text>
  </g>

  <!-- Ambient pulsing dots -->
  <circle cx="160" cy="100" r="1.5" fill="#a78bfa" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.35;0.1" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;2;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="100" r="1.5" fill="#a78bfa" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.35;0.1" dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;2;1" dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="140" r="1" fill="#c084fc" opacity="0.15">
    <animate attributeName="opacity" values="0.08;0.25;0.08" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="140" r="1" fill="#c084fc" opacity="0.15">
    <animate attributeName="opacity" values="0.08;0.25;0.08" dur="3s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom border glow -->
  <rect x="0" y="276" width="900" height="4" rx="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
